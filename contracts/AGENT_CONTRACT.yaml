workflow:
  # Как работать. Строго следовать.
  cycle:
    - "Прочитать текущий PLAN.md"
    - "Выбрать следующую задачу (по порядку)"
    - "Написать тесты для задачи"
    - "Реализовать модуль"
    - "Убедиться что тесты зелёные"
    - "Обновить PLAN.md (отметить done)"
    - "Написать краткое резюме что сделал"
    - "Перейти к следующей задаче"
  
  when_stuck:
    - "Если не знаешь API — пишешь clean interface + заглушку"
    - "Если не уверен в архитектуре — пишешь Doc вопрос через ревьюера"
    - "Если тесты не зелёные — НЕ переходить к следующей задаче"
  
  when_done:
    - "Все модули реализованы"
    - "Все тесты зелёные"
    - "README обновлён"
    - "Система проходит smoke test"
    - "Ожидаем API ключи от пользователя"

contracts:
  persona_path: "contracts/korm/persona.yaml"
  agent_contract_path: "contracts/AGENT_CONTRACT.yaml"  # этот файл

test_scenario:
  name: "Продавец корма для овчарки"
  description: >
    В чате кинологов кто-то пишет:
    "Подскажите корм для немецкой овчарки 3 года, 
    аллергия на курицу, чешутся уши"
    
    Ожидаемый flow:
    1. Router: RESPOND (confidence 0.9, keywords: корм, овчарка, аллергия)
    2. Generator: экспертный ответ про гипоаллергенный корм, 
       упомянуть ягнёнка, без прямой продажи
    3. Memory: записать порода (овчарка), проблемы (аллергия, уши)
    4. Если юзер потом пишет в ЛС — подтянуть контекст

  another_scenario:
    description: "В чате кто-то обсуждает политику"
    expected: "Router: IGNORE (confidence 0.95)"

  dm_scenario:
    description: "Пользователь из группы пишет в ЛС: 'А про корм подробнее'"
    expected: >
      1. Подтянуть контекст из группы
      2. Generator: подробная консультация + мягкий переход к продукту
      3. Memory: обновить воронку → soft_sold
